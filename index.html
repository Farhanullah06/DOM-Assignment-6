<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Assignment #6 - Form Validation</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-mesh"></div>
    
    <main class="container">
        <div class="form-card">
            <header class="card-header">
                <div class="icon-wrapper">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
                        <polyline points="10 17 15 12 10 7"/>
                        <line x1="15" y1="12" x2="3" y2="12"/>
                    </svg>
                </div>
                <h1>Create Account</h1>
                <p class="subtitle">Form Events & Validation Demo</p>
            </header>

            <form id="registrationForm" class="registration-form" novalidate>
                <!-- Name Field -->
                <div class="input-group">
                    <label for="nameInput" class="input-label">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        <span>Full Name</span>
                    </label>
                    <input 
                        type="text" 
                        id="nameInput" 
                        class="input-field" 
                        placeholder="Enter your full name"
                        autocomplete="name"
                    >
                    <span class="field-error" id="nameError"></span>
                </div>

                <!-- Email Field -->
                <div class="input-group">
                    <label for="emailInput" class="input-label">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                            <polyline points="22,6 12,13 2,6"/>
                        </svg>
                        <span>Email Address</span>
                    </label>
                    <input 
                        type="email" 
                        id="emailInput" 
                        class="input-field" 
                        placeholder="you@example.com"
                        autocomplete="email"
                    >
                    <span class="field-error" id="emailError"></span>
                </div>

                <!-- Password Field -->
                <div class="input-group">
                    <label for="passwordInput" class="input-label">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        <span>Password</span>
                    </label>
                    <input 
                        type="password" 
                        id="passwordInput" 
                        class="input-field" 
                        placeholder="Minimum 6 characters"
                        autocomplete="new-password"
                    >
                    <span class="field-error" id="passwordError"></span>
                    <div class="password-strength" id="passwordStrength">
                        <div class="strength-bar"></div>
                        <div class="strength-bar"></div>
                        <div class="strength-bar"></div>
                    </div>
                </div>

                <!-- Message Display Area (Task 5) -->
                <div id="formMessage" class="form-message"></div>

                <!-- Buttons -->
                <div class="button-group">
                    <button type="submit" id="submitBtn" class="btn btn-primary">
                        <span>Submit Form</span>
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="5" y1="12" x2="19" y2="12"/>
                            <polyline points="12 5 19 12 12 19"/>
                        </svg>
                    </button>
                    <button type="button" id="resetBtn" class="btn btn-secondary">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                            <path d="M3 3v5h5"/>
                        </svg>
                        <span>Reset</span>
                    </button>
                </div>
            </form>

            <footer class="card-footer">
                <p>DOM Assignment #6 - Form Events & Validation</p>
            </footer>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
